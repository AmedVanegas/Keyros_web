<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyros</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="index.css">
    <link rel="icon" type="image/png" href="/imgs/page__icon.png">
</head>

<body>

    <header class="header__container">


        <div class="logo">
            <img src="/imgs/logo_main.svg" alt="" class="logo__img">
        </div>

        <div class=" logo logo__mobile"><img src="/imgs/page__icon.png" alt="" class="logo__img">
        </div>

        <input type="checkbox" id="toggle__menu">
        <label for="toggle__menu">
            <img class="menu__icon" src="/imgs/bars-solid-full.svg" alt="">
        </label>

        <nav class="menu">
            <ul class="menu__list">
                <li class="menu__item"><a href="">Nosotros</a></li>
                <li class="menu__item"><a href="">Servicios</a></li>
                <li class="menu__item agenda"><a href="">Agenda Ahora</a></li>
            </ul>
        </nav>

    </header>

    <main>

        <section class="container__main__page">



            <div class="main__title">

                <div class="floating__text">
                    <p><img src="" alt=""> Bienestar integral</p>
                </div>

                <h1>Transforma <br> mente y cuerpo </h1>
                <div class="menu__buttons">

                    <p class="description__text">Descubre un espacio dedicado a tu sanación emocional, donde la relajación y la conexión interior
                        son nuestra prioridad.</p>

                    <button class="start">
                        <p>Comienza Hoy</p>
                    </button>
                    <button class="services">
                        <p>Nuestros Servicios</p>
                    </button>


                </div>
            </div>

            <div class="main__image">

                <img src="/imgs/contraluz-silueta-atardecer.jpg" alt="">
                <div class="float__card">
                    <div class="float__card__icon">
                        <img src="/imgs/icono-hoja.svg" alt="">
                    </div>
                    <div>
                        <p class="float__card__label">Agenda hoy</p>
                        <p class="float__card__texto">30% de Descuento</p>
                    </div>


                </div>




        </section>


    </main>

    <footer>
        <p>Keyros 2024</p>


    </footer>


</body>

</html>
